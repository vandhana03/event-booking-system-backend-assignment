version: "3.9"

services:
  # ─── MySQL Database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: event_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql          # persist data across restarts
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql  # auto-run on first boot
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Node.js API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy      # wait until MySQL is ready
    environment:
      PORT: ${PORT:-3000}
      DB_HOST: db                       # service name = hostname inside Docker network
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./swagger.yaml:/app/swagger.yaml  # reflect swagger changes without rebuild

volumes:
  db_data:
    driver: local
